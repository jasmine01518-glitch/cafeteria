<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구내식당 점심</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
      background: #b8e5ff;
    }

    /* ── layout ── */
    .wrap {
      display: flex;
      height: 100vh;
    }

    .panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .panel:hover { flex: 1.6; }

    /* ── background colors ── */
    .panel--menu  { background: #b8e5ff; }
    .panel--timer { background: #999; }

    /* ── big label (default state) ── */
    .label {
      position: absolute;
      bottom: 2.5rem;
      left: 2.5rem;
      font-size: clamp(5rem, 14vw, 11rem);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: -0.03em;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .panel--menu  .label { color: rgba(255,255,255,0.55); }
    .panel--timer .label { color: rgba(180,180,180,0.45); }

    .panel:hover .label {
      opacity: 0;
      transform: translateY(18px);
    }

    /* ── content (revealed on hover) ── */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2.8rem 2.5rem;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.35s ease 0.08s, transform 0.35s ease 0.08s;
      pointer-events: none;
    }
    .panel:hover .content {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── top meta label ── */
    .meta {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2.2rem;
    }
    .panel--menu  .meta { color: rgba(30,100,160,0.55); }
    .panel--timer .meta { color: rgba(255,255,255,0.4); }

    /* ── menu items ── */
    .menu-title {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(30,100,160,0.7);
      margin-bottom: 1.2rem;
    }

    .menu-list {
      list-style: none;
    }
    .menu-list li {
      font-size: clamp(1.05rem, 2.2vw, 1.55rem);
      font-weight: 300;
      color: #1a5f8a;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(30,100,160,0.12);
    }
    .menu-list li:last-child { border-bottom: none; }

    .no-menu {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(30,100,160,0.45);
    }

    /* ── timer ── */
    .timer-status {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.5rem;
    }

    .timer-display {
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 200;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
    }

    .timer-sub {
      margin-top: 0.6rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38);
    }

    /* progress bar */
    .bar-wrap {
      margin-top: 2.4rem;
      height: 1px;
      background: rgba(255,255,255,0.18);
      width: 100%;
      max-width: 280px;
    }
    .bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      width: 0%;
      transition: width 1s linear;
    }

    /* closed state */
    .timer-display.closed {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      opacity: 0.45;
    }

    /* ── divider line ── */
    .divider {
      width: 1px;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Menu Panel -->
  <div class="panel panel--menu">
    <div class="label">Menu</div>
    <div class="content">
      <div class="meta" id="menuDate"></div>
      <div class="menu-title">오늘의 점심 · Lunch</div>
      <ul class="menu-list" id="menuList"></ul>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Timer Panel -->
  <div class="panel panel--timer">
    <div class="label">Timer</div>
    <div class="content">
      <div class="meta">Lunch 11:50 — 13:30</div>
      <div class="timer-status" id="timerStatus"></div>
      <div class="timer-display" id="timerDisplay">--:--</div>
      <div class="timer-sub" id="timerSub"></div>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ────────────────────────────────────────────────────
  // 주간 메뉴 데이터 (매주 월요일에 업데이트하세요)
  // key: 1=월 2=화 3=수 4=목 5=금
  // ────────────────────────────────────────────────────
  const weeklyMenu = {
    1: ['현미밥', '된장찌개', '돼지불고기', '시금치나물', '배추김치', '요구르트'],
    2: ['잡곡밥', '부대찌개', '닭갈비', '콩나물무침', '깍두기', '사과'],
    3: ['흑미밥', '미역국', '생선구이', '감자조림', '배추김치', '오렌지'],
    4: ['현미밥', '순두부찌개', '제육볶음', '브로콜리무침', '열무김치', '바나나'],
    5: ['잡곡밥', '갈비탕', '탕수육', '시금치나물', '배추김치', '귤'],
  };

  const DAY_KO = ['일', '월', '화', '수', '목', '금', '토'];

  function renderMenu() {
    const now = new Date();
    const dow = now.getDay();
    const dateStr =
      `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())} ${DAY_KO[dow]}`;
    document.getElementById('menuDate').textContent = dateStr;

    const list = document.getElementById('menuList');
    const items = weeklyMenu[dow];
    if (!items) {
      list.outerHTML = '<p class="no-menu">오늘은 운영하지 않습니다</p>';
    } else {
      list.innerHTML = items.map(i => `<li>${i}</li>`).join('');
    }
  }

  // ── Timer ──────────────────────────────────────────
  const OPEN  = 11 * 3600 + 50 * 60;   // 11:50 in seconds
  const CLOSE = 13 * 3600 + 30 * 60;   // 13:30 in seconds
  const SPAN  = CLOSE - OPEN;

  function pad(n) { return String(n).padStart(2, '0'); }

  function fmtMMSS(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}분 ${pad(s)}초`;
  }

  function updateTimer() {
    const now = new Date();
    const cur = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

    const statusEl  = document.getElementById('timerStatus');
    const displayEl = document.getElementById('timerDisplay');
    const subEl     = document.getElementById('timerSub');
    const barEl     = document.getElementById('barFill');

    displayEl.classList.remove('closed');

    if (cur < OPEN) {
      // 점심 시간 전
      const diff = OPEN - cur;
      statusEl.textContent  = '점심까지';
      displayEl.textContent = fmtMMSS(diff);
      subEl.textContent     = '남았습니다';
      barEl.style.width     = '0%';

    } else if (cur <= CLOSE) {
      // 운영 중
      const diff = CLOSE - cur;
      const pct  = ((SPAN - diff) / SPAN) * 100;
      statusEl.textContent  = '마감까지';
      displayEl.textContent = fmtMMSS(diff);
      subEl.textContent     = '남았습니다';
      barEl.style.width     = pct + '%';

    } else {
      // 운영 종료
      displayEl.classList.add('closed');
      statusEl.textContent  = '';
      displayEl.textContent = '오늘 운영 종료';
      subEl.textContent     = '내일 11:50에 다시 만나요';
      barEl.style.width     = '100%';
    }
  }

  renderMenu();
  updateTimer();
  setInterval(updateTimer, 1000);
</script>
</body>
</html>
