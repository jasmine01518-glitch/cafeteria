<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구내식당 점심</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
    }

    /* ── 전체: 세로 column ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 탭 공통 ── */
    .tab {
      width: 100%;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    /* 그라디언트는 ::after로 얹어서 opacity transition (solid → gradient는 직접 transition 불가) */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Timer 남은 시간 오버레이 ── */
    .timer-overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.3));
      pointer-events: none;
      z-index: 2;
      transition: width 1s linear;
    }

    /* ── Lunch 탭 ── */
    .tab--lunch {
      height: 22vh;
      background: #00BAFF;
      transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab--lunch::after {
      background: linear-gradient(to bottom, #00BAFF, #969696);
    }

    .tab--lunch:hover {
      height: 100vh;
    }

    .tab--lunch:hover::after {
      opacity: 1;
    }

    /* ── Timer 탭 ── */
    .tab--timer {
      height: 22vh;
      background: #60D4FF;
      transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab--timer::after {
      background: linear-gradient(to bottom, #60D4FF, #969696);
    }

    .tab--timer:hover {
      height: 100vh;
    }

    .tab--timer:hover::after {
      opacity: 1;
    }

    /* ── 하단 회색 영역 ── */
    .base {
      flex: 1;
      background: #969696;
    }

    /* ── 탭 레이블: 좌측 하단 ── */
    .label {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: #CBF1FF;
      user-select: none;
      pointer-events: none;
      z-index: 3;
      transition: opacity 0.25s ease;
    }

    .tab:hover .label {
      opacity: 0;
    }

    /* ── 확장 시 표시되는 콘텐츠 ── */
    .tab-content {
      position: absolute;
      bottom: 2.5rem;
      left: 2.5rem;
      right: 2.5rem;
      z-index: 3;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease 0.18s, transform 0.3s ease 0.18s;
      pointer-events: none;
    }

    .tab:hover .tab-content {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Lunch 콘텐츠: 날짜 + 메뉴가 하나의 텍스트 블록 ── */
    .menu-title { display: none; }

    .tab--lunch .tab-content .meta,
    .tab--lunch .tab-content .menu-list li,
    .tab--lunch .tab-content .no-menu {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.3);
      text-transform: none;
      margin: 0;
      padding: 0;
      border: none;
    }

    .tab--lunch .tab-content .meta {
      margin-bottom: 0;
    }

    .menu-list { list-style: none; }

    /* ── 공통 메타 (Timer용) ── */
    .meta {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      color: rgba(255,255,255,0.55);
    }

    /* ── 타이머 ── */
    .timer-status,
    .timer-sub,
    .bar-wrap { display: none; }

    .timer-display {
      font-size: clamp(3.5rem, 11vw, 9rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: rgba(255,255,255,0.3);
    }

    .bar-wrap {
      margin-top: 1.5rem;
      height: 1px;
      background: rgba(255,255,255,0.2);
      width: 100%;
      max-width: 260px;
    }

    .bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      width: 0%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Lunch 탭 -->
  <div class="tab tab--lunch">
    <div class="label">Lunch</div>
    <div class="tab-content">
      <div class="meta" id="menuDate"></div>
      <div class="menu-title">오늘의 점심 · Lunch</div>
      <ul class="menu-list" id="menuList"></ul>
    </div>
  </div>

  <!-- Timer 탭 -->
  <div class="tab tab--timer">
    <div class="timer-overlay" id="timerOverlay"></div>
    <div class="label">Timer</div>
    <div class="tab-content">
      <div class="meta">Lunch 11:50 — 13:30</div>
      <div class="timer-status" id="timerStatus"></div>
      <div class="timer-display" id="timerDisplay">--:--</div>
      <div class="timer-sub" id="timerSub"></div>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
  </div>

  <!-- 하단 회색 영역 -->
  <div class="base"></div>

</div>

<!-- Share / Rate: 독립 fixed 레이어 -->
<div style="
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 100;
  text-align: right;
  line-height: 1.05;
  font-family: 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
  font-size: clamp(3.5rem, 11vw, 9rem);
  font-weight: 300;
  letter-spacing: -0.03em;
  color: rgba(255,255,255,0.3);
  pointer-events: none;
  user-select: none;
">
  Share<br>Rate
</div>

<script>
  // ── 테스트용 고정값 (null로 바꾸면 실제 날짜/시간으로 동작) ──
  const FORCE_DATE_KEY = '0430';   // 메뉴 키 및 날짜 표시
  const FORCE_TIME     = '12:30';  // 타이머 기준 시간 (HH:MM)

  // ── 공통 유틸 ───────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }

  function nowKST() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  }

  // 메뉴 키: FORCE_DATE_KEY가 있으면 사용, 없으면 실제 KST 날짜 MMDD
  function getMenuKey() {
    if (FORCE_DATE_KEY) return FORCE_DATE_KEY;
    const now = nowKST();
    return `${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
  }

  // 현재 시각(초): FORCE_TIME이 있으면 고정, 없으면 실제 KST 시각
  function getCurrentSec() {
    if (FORCE_TIME) {
      const [h, m] = FORCE_TIME.split(':').map(Number);
      return h * 3600 + m * 60;
    }
    const now = nowKST();
    return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
  }

  // ── Menu ───────────────────────────────────────────
  function renderMenu(key, items) {
    document.getElementById('menuDate').textContent = key;
    const list = document.getElementById('menuList');
    if (!items || items.length === 0) {
      list.innerHTML = '<li class="no-menu">오늘 점심 메뉴 없음</li>';
    } else {
      list.innerHTML = items.map(i => `<li>${i}</li>`).join('');
    }
  }

  function renderMenuError() {
    // fetch 또는 JSON 파싱 실패 시에만 호출
    document.getElementById('menuDate').textContent = getMenuKey();
    document.getElementById('menuList').innerHTML =
      '<li class="no-menu">메뉴를 불러올 수 없습니다</li>';
  }

  async function loadMenu() {
    const key = getMenuKey();
    try {
      const res = await fetch('./menu.json');
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
      const data = await res.json();

      // ── 디버깅용 ──
      console.log('loaded menu data:', data);
      console.log('FORCE_DATE_KEY:', FORCE_DATE_KEY);
      console.log('data.menus[key]:', data.menus?.[key]);

      renderMenu(key, data.menus?.[key]);
    } catch (e) {
      console.error('menu load error:', e);
      renderMenuError();
    }
  }

  // ── Timer ──────────────────────────────────────────
  const OPEN  = 11 * 3600 + 50 * 60;
  const CLOSE = 13 * 3600 + 30 * 60;
  const SPAN  = CLOSE - OPEN;

  // diffSec → "1H 20M" 또는 "25M" 형식
  function fmtMin(diffSec) {
    const totalMin = Math.floor(diffSec / 60);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h > 0 ? `${h}H ${m}M` : `${m}M`;
  }

  function updateTimer() {
    const cur       = getCurrentSec();
    const displayEl = document.getElementById('timerDisplay');
    const overlayEl = document.getElementById('timerOverlay');

    if (cur < OPEN) {
      // 점심 시작 전: 음수 표시
      const diff = OPEN - cur;
      displayEl.textContent = `-${fmtMin(diff)}`;
      overlayEl.style.width = '100%';

    } else if (cur <= CLOSE) {
      // 점심 중: 남은 시간 + LEFT
      const diff      = CLOSE - cur;
      const remaining = (diff / SPAN) * 100;
      displayEl.textContent = `${fmtMin(diff)} LEFT`;
      overlayEl.style.width = remaining + '%';

    } else {
      // 종료
      displayEl.textContent = 'CLOSED';
      overlayEl.style.width = '0%';
    }
  }

  loadMenu();
  updateTimer();
  // FORCE_TIME이 고정값이면 setInterval 불필요하지만 실제 시간 모드 대비 유지
  if (!FORCE_TIME) setInterval(updateTimer, 1000);
</script>
</body>
</html>
