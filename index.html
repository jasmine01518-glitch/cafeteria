<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구내식당 점심</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
    }

    /* ── 전체: 세로 column ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 탭 공통 ── */
    .tab {
      width: 100%;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    /* 그라디언트는 ::after로 얹어서 opacity transition (solid → gradient는 직접 transition 불가) */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    /* ── Lunch 탭 ── */
    .tab--lunch {
      height: 22vh;
      background: #00BAFF;
      transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab--lunch::after {
      background: linear-gradient(to bottom, #00BAFF, #969696);
    }

    .tab--lunch:hover {
      height: 100vh;
    }

    .tab--lunch:hover::after {
      opacity: 1;
    }

    /* ── Timer 탭 ── */
    .tab--timer {
      height: 22vh;
      background: #60D4FF;
      transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab--timer::after {
      background: linear-gradient(to bottom, #60D4FF, #969696);
    }

    .tab--timer:hover {
      height: 100vh;
    }

    .tab--timer:hover::after {
      opacity: 1;
    }

    /* ── 하단 회색 영역 ── */
    .base {
      flex: 1;
      background: #969696;
    }

    /* ── 탭 레이블: 좌측 하단 ── */
    .label {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: #CBF1FF;
      user-select: none;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.25s ease;
    }

    .tab:hover .label {
      opacity: 0;
    }

    /* ── 확장 시 표시되는 콘텐츠 ── */
    .tab-content {
      position: absolute;
      top: 2.5rem;
      left: 2.5rem;
      right: 2.5rem;
      z-index: 1;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.3s ease 0.18s, transform 0.3s ease 0.18s;
      pointer-events: none;
      color: #fff;
    }

    .tab:hover .tab-content {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 공통 메타 ── */
    .meta {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      color: rgba(255,255,255,0.55);
    }

    /* ── 메뉴 ── */
    .menu-title {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 0.9rem;
    }

    .menu-list { list-style: none; }

    .menu-list li {
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      font-weight: 300;
      color: #fff;
      padding: 0.38rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    .menu-list li:last-child { border-bottom: none; }

    .no-menu {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
    }

    /* ── 타이머 ── */
    .timer-status {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.3rem;
    }

    .timer-display {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 200;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
    }

    .timer-display.closed {
      font-size: clamp(1.2rem, 3vw, 2rem);
      opacity: 0.45;
    }

    .timer-sub {
      margin-top: 0.4rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38);
    }

    .bar-wrap {
      margin-top: 1.5rem;
      height: 1px;
      background: rgba(255,255,255,0.2);
      width: 100%;
      max-width: 260px;
    }

    .bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      width: 0%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Lunch 탭 -->
  <div class="tab tab--lunch">
    <div class="label">Lunch</div>
    <div class="tab-content">
      <div class="meta" id="menuDate"></div>
      <div class="menu-title">오늘의 점심 · Lunch</div>
      <ul class="menu-list" id="menuList"></ul>
    </div>
  </div>

  <!-- Timer 탭 -->
  <div class="tab tab--timer">
    <div class="label">Timer</div>
    <div class="tab-content">
      <div class="meta">Lunch 11:50 — 13:30</div>
      <div class="timer-status" id="timerStatus"></div>
      <div class="timer-display" id="timerDisplay">--:--</div>
      <div class="timer-sub" id="timerSub"></div>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
  </div>

  <!-- 하단 회색 영역 -->
  <div class="base"></div>

</div>

<script>
  // ── Menu ───────────────────────────────────────────
  const DAY_KEYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  const DAY_KO   = ['일', '월', '화', '수', '목', '금', '토'];

  function pad(n) { return String(n).padStart(2, '0'); }

  function nowKST() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  }

  function renderMenu(items) {
    const now = nowKST();
    const dow = now.getDay();
    const dateStr =
      `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())} ${DAY_KO[dow]}`;
    document.getElementById('menuDate').textContent = dateStr;

    const list = document.getElementById('menuList');
    if (!items || items.length === 0) {
      list.innerHTML = '<li class="no-menu">오늘 점심 메뉴 없음</li>';
    } else {
      list.innerHTML = items.map(i => `<li>${i}</li>`).join('');
    }
  }

  function renderMenuError() {
    document.getElementById('menuDate').textContent = '';
    document.getElementById('menuList').innerHTML =
      '<li class="no-menu">메뉴를 불러올 수 없습니다</li>';
  }

  async function loadMenu() {
    try {
      const res = await fetch('./menu.json');
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      const dow = nowKST().getDay();
      const key = DAY_KEYS[dow];
      renderMenu(data.menus?.[key]);
    } catch {
      renderMenuError();
    }
  }

  // ── Timer ──────────────────────────────────────────
  const OPEN  = 11 * 3600 + 50 * 60;
  const CLOSE = 13 * 3600 + 30 * 60;
  const SPAN  = CLOSE - OPEN;

  function fmtMMSS(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}분 ${pad(s)}초`;
  }

  function updateTimer() {
    const now = nowKST();
    const cur = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

    const statusEl  = document.getElementById('timerStatus');
    const displayEl = document.getElementById('timerDisplay');
    const subEl     = document.getElementById('timerSub');
    const barEl     = document.getElementById('barFill');

    displayEl.classList.remove('closed');

    if (cur < OPEN) {
      const diff = OPEN - cur;
      statusEl.textContent  = '점심까지';
      displayEl.textContent = fmtMMSS(diff);
      subEl.textContent     = '남았습니다';
      barEl.style.width     = '0%';

    } else if (cur <= CLOSE) {
      const diff = CLOSE - cur;
      const pct  = ((SPAN - diff) / SPAN) * 100;
      statusEl.textContent  = '마감까지';
      displayEl.textContent = fmtMMSS(diff);
      subEl.textContent     = '남았습니다';
      barEl.style.width     = pct + '%';

    } else {
      displayEl.classList.add('closed');
      statusEl.textContent  = '';
      displayEl.textContent = '오늘 운영 종료';
      subEl.textContent     = '내일 11:50에 다시 만나요';
      barEl.style.width     = '100%';
    }
  }

  loadMenu();
  updateTimer();
  setInterval(updateTimer, 1000);
</script>
</body>
</html>
